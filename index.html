<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Surprise 🌸</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Great+Vibes&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    overflow: hidden;
    transition: background 1s ease;
}

/* Backgrounds */
.bg1 { background: linear-gradient(135deg, #ff9a9e, #fecfef); }
.bg2 { background: linear-gradient(135deg, #fbc2eb, #a6c1ee); }
.bg3 { background: linear-gradient(135deg, #ffecd2, #fcb69f); }
.bg4 { background: linear-gradient(135deg, #a1c4fd, #c2e9fb); }

/* Layout */
.container {
    display: flex;
    height: 100vh;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
    color: white;
}

/* Date */
.date-text {
    font-family: 'Playfair Display', serif;
    font-size: 3em;
    letter-spacing: 2px;
    animation: fadeUp 2s ease forwards;
}

/* Question */
.question {
    font-size: 4em;
    margin-top: 10px;
    animation: pulse 1.5s infinite;
}

/* Hint */
.hint {
    margin-top: 10px;
    opacity: 0.8;
}

/* Button */
button {
    padding: 12px 25px;
    border-radius: 25px;
    background: white;
    color: #ff4d6d;
    border: none;
    cursor: pointer;
    margin-top: 20px;
}

/* Card */
.card {
    background: rgba(255,255,255,0.9);
    color: #333;
    padding: 25px;
    border-radius: 20px;
    width: 320px;
    backdrop-filter: blur(10px);
}

/* Image */
.photo {
    width: 100%;
    border-radius: 15px;
    animation: zoom 6s infinite alternate;
}

/* Message */
.message {
    margin-top: 15px;
    font-size: 16px;
    color: #ff4d6d;
    min-height: 60px;
}

/* Final Birthday Text */
.final-text {
    font-family: 'Great Vibes', cursive;
    font-size: 4em;
    color: white;
    text-shadow: 0 0 20px rgba(255,255,255,0.8),
                 0 0 40px rgba(255,105,135,0.8);
    animation: fadeUp 2s ease;
}

/* Animations */
@keyframes fadeUp {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

@keyframes pulse {
    0% {opacity: 0.5; transform: scale(1);}
    50% {opacity: 1; transform: scale(1.2);}
    100% {opacity: 0.5; transform: scale(1);}
}

@keyframes zoom {
    from {transform: scale(1);}
    to {transform: scale(1.1);}
}

/* Flowers */
.flower {
    position: fixed;
    bottom: -20px;
    font-size: 20px;
    animation: floatUp 8s linear infinite;
}

@keyframes floatUp {
    from {transform: translateY(0) rotate(0deg);}
    to {transform: translateY(-100vh) rotate(360deg);}
}

.hidden { display: none; }

</style>
</head>

<body class="bg1">

<!-- 🌟 Landing Page -->
<div id="page1" class="container">
    <div class="date-text">July 10</div>
    <div class="question">?</div>
    
    <!-- 👇 You can change this text anytime -->
    <p class="hint">Do you remember this day?</p>
    
    <button onclick="goNext()">Reveal ✨</button>
</div>

<!-- 💌 Slides -->
<div id="page2" class="container hidden">
    <div class="card">
        <img id="photo" class="photo" src="">
        <div id="msg" class="message"></div>
        <button onclick="nextSlide()">Next ➡️</button>
    </div>
</div>

<!-- 🎉 Final Page -->
<div id="page3" class="container hidden">
    <h1 class="final-text">Happy Birthday ❤️</h1>
    <p>You are truly special 🌸</p>
</div>

<script>
let slides = [
    {img: "https://picsum.photos/id/1018/300/200", text: "This was the day everything started...", bg:"bg1"},
    {img: "https://picsum.photos/id/1015/300/200", text: "A memory I will always cherish...", bg:"bg2"},
    {img: "https://picsum.photos/id/1025/300/200", text: "You made this day unforgettable...", bg:"bg3"}
];

let index = 0;

function goNext() {
    document.getElementById("page1").classList.add("hidden");
    document.getElementById("page2").classList.remove("hidden");
    createFlowers();
    showSlide();
}

function showSlide() {
    document.body.className = slides[index].bg;
    document.getElementById("photo").src = slides[index].img;
    typeText(slides[index].text);
}

function nextSlide() {
    index++;
    
    if(index >= slides.length) {
        document.getElementById("page2").classList.add("hidden");
        document.getElementById("page3").classList.remove("hidden");
        document.body.className = "bg4";
        return;
    }
    
    showSlide();
}

/* Typing */
function typeText(text) {
    let i = 0;
    let msg = document.getElementById("msg");
    msg.innerHTML = "";

    let interval = setInterval(() => {
        msg.innerHTML += text.charAt(i);
        i++;
        if (i >= text.length) clearInterval(interval);
    }, 40);
}

/* Flowers */
function createFlowers() {
    setInterval(() => {
        let flower = document.createElement("div");
        flower.innerHTML = "🌸";
        flower.className = "flower";
        flower.style.left = Math.random() * 100 + "vw";
        flower.style.fontSize = (Math.random() * 20 + 15) + "px";
        document.body.appendChild(flower);

        setTimeout(() => flower.remove(), 8000);
    }, 400);
}
</script>

</body>
</html>
