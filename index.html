<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Surprise 💖</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    overflow: hidden;
}

/* Page animation */
.fade-in {
    animation: fadeIn 1.5s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: scale(0.95);}
    to {opacity: 1; transform: scale(1);}
}

.container {
    display: flex;
    height: 100vh;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
    color: white;
}

h1 {
    font-size: 3em;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from {text-shadow: 0 0 10px white;}
    to {text-shadow: 0 0 25px #ff6b81;}
}

button {
    padding: 12px 25px;
    border-radius: 25px;
    background: white;
    color: #ff6b81;
    border: none;
    cursor: pointer;
    margin-top: 20px;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
}

.hidden {
    display: none;
}

.card {
    background: white;
    color: #333;
    padding: 25px;
    border-radius: 20px;
    width: 320px;
    animation: fadeIn 1s ease;
}

/* Image zoom animation */
.photo {
    width: 100%;
    border-radius: 15px;
    animation: zoom 6s infinite alternate;
}

@keyframes zoom {
    from {transform: scale(1);}
    to {transform: scale(1.1);}
}

.message {
    margin-top: 15px;
    font-size: 16px;
    color: #ff6b81;
    min-height: 60px;
}

/* Floating hearts */
.heart {
    position: fixed;
    bottom: -10px;
    color: red;
    animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
    from {transform: translateY(0);}
    to {transform: translateY(-100vh);}
}

/* Confetti */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    pointer-events: none;
}
</style>
</head>

<body>

<canvas id="confetti"></canvas>

<div id="page1" class="container fade-in">
    <h1>🎉 Happy Birthday ❤️</h1>
    <p>Something special is waiting...</p>
    <button onclick="goNext()">Open 🎁</button>
</div>

<div id="page2" class="container hidden">
    <div class="card fade-in">
        <img id="photo" class="photo" src="">
        <div id="msg" class="message"></div>
        <button onclick="nextSlide()">Next ➡️</button>
    </div>
</div>

<audio id="music" src="https://www.bensound.com/bensound-music/bensound-romantic.mp3"></audio>

<script>
let slides = [
    {img: "https://picsum.photos/id/1018/300/200", text: "You walked into my life..." },
    {img: "https://picsum.photos/id/1015/300/200", text: "And everything changed..." },
    {img: "https://picsum.photos/id/1025/300/200", text: "Your smile means everything..." },
    {img: "https://picsum.photos/id/1035/300/200", text: "Happy Birthday to the most special person ❤️" }
];

let index = 0;

function goNext() {
    document.getElementById("page1").classList.add("hidden");
    document.getElementById("page2").classList.remove("hidden");

    document.getElementById("music").play();
    startConfetti();
    createHearts();
    showSlide();
}

function showSlide() {
    document.getElementById("photo").src = slides[index].img;
    typeText(slides[index].text);
}

function nextSlide() {
    index = (index + 1) % slides.length;
    showSlide();
}

/* Typing animation */
function typeText(text) {
    let i = 0;
    let msg = document.getElementById("msg");
    msg.innerHTML = "";

    let interval = setInterval(() => {
        msg.innerHTML += text.charAt(i);
        i++;
        if (i >= text.length) clearInterval(interval);
    }, 35);
}

/* Confetti */
function startConfetti() {
    const canvas = document.getElementById('confetti');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let pieces = [];
    for (let i = 0; i < 120; i++) {
        pieces.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 8,
            speed: Math.random() * 3 + 1
        });
    }

    function update() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        pieces.forEach(p => {
            p.y += p.speed;
            if (p.y > canvas.height) p.y = 0;
            ctx.fillRect(p.x, p.y, p.size, p.size);
        });
        requestAnimationFrame(update);
    }

    update();
}

/* Floating hearts */
function createHearts() {
    setInterval(() => {
        let heart = document.createElement("div");
        heart.innerHTML = "❤️";
        heart.className = "heart";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = (Math.random() * 20 + 10) + "px";
        document.body.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 6000);
    }, 300);
}
</script>

</body>
</html>
