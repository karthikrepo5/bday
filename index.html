<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Surprise 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    overflow: hidden;
}

/* Premium Birthday Text */
.birthday-text {
    font-family: 'Great Vibes', cursive;
    font-size: 4em;
    background: linear-gradient(45deg, #ffffff, #ff6b81, #ffffff);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: gradientMove 4s ease infinite, fadeSlide 2s ease forwards;
    opacity: 0;
    text-shadow: 0 0 20px rgba(255,255,255,0.6);
}

@keyframes gradientMove {
    0% {background-position: 0%;}
    50% {background-position: 100%;}
    100% {background-position: 0%;}
}

@keyframes fadeSlide {
    from {opacity: 0; transform: translateY(30px) scale(0.9);}
    to {opacity: 1; transform: translateY(0) scale(1);}
}

.container {
    display: flex;
    height: 100vh;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
    color: white;
}

button {
    padding: 12px 25px;
    border-radius: 25px;
    background: white;
    color: #ff6b81;
    border: none;
    cursor: pointer;
    margin-top: 20px;
}

.hidden {
    display: none;
}

.card {
    background: white;
    color: #333;
    padding: 25px;
    border-radius: 20px;
    width: 320px;
}

.photo {
    width: 100%;
    border-radius: 15px;
    animation: zoom 6s infinite alternate;
}

@keyframes zoom {
    from {transform: scale(1);}
    to {transform: scale(1.1);}
}

.message {
    margin-top: 15px;
    font-size: 16px;
    color: #ff6b81;
    min-height: 60px;
}

/* Floating hearts */
.heart {
    position: fixed;
    bottom: -10px;
    animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
    from {transform: translateY(0);}
    to {transform: translateY(-100vh);}
}

/* Confetti */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    pointer-events: none;
}
</style>
</head>

<body>

<canvas id="confetti"></canvas>

<!-- Page 1 -->
<div id="page1" class="container">
    <h1 class="birthday-text">Happy Birthday ❤️</h1>
    <p>You mean more than words can say...</p>
    <button onclick="goNext()">Open Your Surprise 🎁</button>
</div>

<!-- Page 2 -->
<div id="page2" class="container hidden">
    <div class="card">
        <img id="photo" class="photo" src="">
        <div id="msg" class="message"></div>
        <button onclick="nextSlide()">Next ➡️</button>
    </div>
</div>

<audio id="music" src="https://www.bensound.com/bensound-music/bensound-romantic.mp3"></audio>

<script>
let slides = [
    {img: "https://picsum.photos/id/1018/300/200", text: "From the moment you came into my life..." },
    {img: "https://picsum.photos/id/1015/300/200", text: "Everything became more beautiful..." },
    {img: "https://picsum.photos/id/1025/300/200", text: "Your smile means everything to me..." },
    {img: "https://picsum.photos/id/1035/300/200", text: "Today is all about you ❤️ Happy Birthday!" }
];

let index = 0;

function goNext() {
    document.getElementById("page1").classList.add("hidden");
    document.getElementById("page2").classList.remove("hidden");

    document.getElementById("music").play();
    startConfetti();
    createHearts();
    showSlide();
}

function showSlide() {
    document.getElementById("photo").src = slides[index].img;
    typeText(slides[index].text);
}

function nextSlide() {
    index = (index + 1) % slides.length;
    showSlide();
}

/* Typing effect */
function typeText(text) {
    let i = 0;
    let msg = document.getElementById("msg");
    msg.innerHTML = "";

    let interval = setInterval(() => {
        msg.innerHTML += text.charAt(i);
        i++;
        if (i >= text.length) clearInterval(interval);
    }, 35);
}

/* Confetti */
function startConfetti() {
    const canvas = document.getElementById('confetti');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let pieces = [];
    for (let i = 0; i < 120; i++) {
        pieces.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 8,
            speed: Math.random() * 3 + 1
        });
    }

    function update() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        pieces.forEach(p => {
            p.y += p.speed;
            if (p.y > canvas.height) p.y = 0;
            ctx.fillRect(p.x, p.y, p.size, p.size);
        });
        requestAnimationFrame(update);
    }

    update();
}

/* Hearts */
function createHearts() {
    setInterval(() => {
        let heart = document.createElement("div");
        heart.innerHTML = "❤️";
        heart.className = "heart";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = (Math.random() * 20 + 10) + "px";
        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 6000);
    }, 300);
}

/* Sparkles */
setInterval(() => {
    let sparkle = document.createElement("div");
    sparkle.innerHTML = "✨";
    sparkle.style.position = "fixed";
    sparkle.style.left = Math.random() * 100 + "vw";
    sparkle.style.top = Math.random() * 100 + "vh";
    sparkle.style.fontSize = "20px";
    document.body.appendChild(sparkle);

    setTimeout(() => sparkle.remove(), 1500);
}, 300);
</script>

</body>
</html>
