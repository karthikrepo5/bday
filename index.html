<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Surprise 💖</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    overflow: hidden;
}

.container {
    display: flex;
    height: 100vh;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
    color: white;
}

h1 {
    font-size: 3em;
}

button {
    padding: 12px 25px;
    border-radius: 25px;
    background: white;
    color: #ff6b81;
    border: none;
    cursor: pointer;
    margin-top: 20px;
}

.hidden {
    display: none;
}

.card {
    background: white;
    color: #333;
    padding: 25px;
    border-radius: 20px;
    width: 320px;
}

.message {
    margin-top: 15px;
    font-size: 16px;
    color: #ff6b81;
    min-height: 60px;
}

/* Photo */
.photo {
    width: 100%;
    border-radius: 15px;
    margin-top: 10px;
}

/* Confetti */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    pointer-events: none;
}
</style>
</head>

<body>

<canvas id="confetti"></canvas>

<!-- Page 1 -->
<div id="page1" class="container">
    <h1>🎉 Happy Birthday ❤️</h1>
    <p>You mean more than words can say...</p>
    <button onclick="goNext()">Open Your Surprise 🎁</button>
</div>

<!-- Page 2 -->
<div id="page2" class="container hidden">
    <div class="card">

        <img id="photo" class="photo" src="https://picsum.photos/300/200">

        <div id="msg" class="message"></div>

        <button onclick="nextSlide()">Next ➡️</button>
    </div>
</div>

<audio id="music" src="https://www.bensound.com/bensound-music/bensound-romantic.mp3"></audio>

<script>
let slides = [
    {
        img: "https://picsum.photos/id/1018/300/200",
        text: "From the moment you came into my life..."
    },
    {
        img: "https://picsum.photos/id/1015/300/200",
        text: "Everything started feeling a little more special..."
    },
    {
        img: "https://picsum.photos/id/1025/300/200",
        text: "Your smile, your presence, your energy..."
    },
    {
        img: "https://picsum.photos/id/1035/300/200",
        text: "Today is all about you. Happy Birthday ❤️"
    }
];

let index = 0;

function goNext() {
    document.getElementById("page1").classList.add("hidden");
    document.getElementById("page2").classList.remove("hidden");
    document.getElementById("music").play();
    startConfetti();
    showSlide();
}

function showSlide() {
    document.getElementById("photo").src = slides[index].img;
    typeText(slides[index].text);
}

function nextSlide() {
    index = (index + 1) % slides.length;
    showSlide();
}

/* Typing effect */
function typeText(text) {
    let i = 0;
    let msg = document.getElementById("msg");
    msg.innerHTML = "";

    let interval = setInterval(() => {
        msg.innerHTML += text.charAt(i);
        i++;
        if (i >= text.length) clearInterval(interval);
    }, 40);
}

/* Confetti */
function startConfetti() {
    const canvas = document.getElementById('confetti');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let pieces = [];
    for (let i = 0; i < 100; i++) {
        pieces.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 8,
            speed: Math.random() * 3 + 1
        });
    }

    function update() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        pieces.forEach(p => {
            p.y += p.speed;
            if (p.y > canvas.height) p.y = 0;
            ctx.fillRect(p.x, p.y, p.size, p.size);
        });
        requestAnimationFrame(update);
    }

    update();
}
</script>

</body>
</html>
