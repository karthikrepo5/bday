<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Surprise 🌸</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #ffdde1, #ee9ca7);
    overflow: hidden;
}

/* Premium Text */
.birthday-text {
    font-family: 'Great Vibes', cursive;
    font-size: 4em;
    background: linear-gradient(45deg, #ffffff, #ffb6c1, #ffffff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: fadeSlide 2s ease forwards;
    opacity: 0;
}

@keyframes fadeSlide {
    from {opacity: 0; transform: translateY(30px);}
    to {opacity: 1; transform: translateY(0);}
}

.container {
    display: flex;
    height: 100vh;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
    color: white;
}

button {
    padding: 12px 25px;
    border-radius: 25px;
    background: white;
    color: #e75480;
    border: none;
    cursor: pointer;
    margin-top: 20px;
}

.hidden {
    display: none;
}

.card {
    background: white;
    color: #333;
    padding: 25px;
    border-radius: 20px;
    width: 320px;
}

.photo {
    width: 100%;
    border-radius: 15px;
    animation: zoom 6s infinite alternate;
}

@keyframes zoom {
    from {transform: scale(1);}
    to {transform: scale(1.1);}
}

.message {
    margin-top: 15px;
    font-size: 16px;
    color: #e75480;
}

/* 🌸 Floating Flowers */
.flower {
    position: fixed;
    bottom: -20px;
    font-size: 20px;
    animation: floatUp 8s linear infinite;
    opacity: 0.8;
}

@keyframes floatUp {
    from {transform: translateY(0) rotate(0deg);}
    to {transform: translateY(-100vh) rotate(360deg);}
}

/* ✨ Fancy particles */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    pointer-events: none;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<!-- Page 1 -->
<div id="page1" class="container">
    <h1 class="birthday-text">Happy Birthday 🌸</h1>
    <p>A beautiful day for a beautiful soul ✨</p>
    <button onclick="goNext()">Open Your Surprise 🎁</button>
</div>

<!-- Page 2 -->
<div id="page2" class="container hidden">
    <div class="card">
        <img id="photo" class="photo" src="">
        <div id="msg" class="message"></div>
        <button onclick="nextSlide()">Next ➡️</button>
    </div>
</div>

<audio id="music" src="https://www.bensound.com/bensound-music/bensound-slowmotion.mp3"></audio>

<script>
let slides = [
    {img: "https://picsum.photos/id/1018/300/200", text: "You bring so much joy into this world..." },
    {img: "https://picsum.photos/id/1015/300/200", text: "Every moment with you feels special..." },
    {img: "https://picsum.photos/id/1025/300/200", text: "Your presence is truly a gift..." },
    {img: "https://picsum.photos/id/1035/300/200", text: "Wishing you endless happiness 🌸" }
];

let index = 0;

function goNext() {
    document.getElementById("page1").classList.add("hidden");
    document.getElementById("page2").classList.remove("hidden");

    document.getElementById("music").play();
    startParticles();
    createFlowers();
    showSlide();
}

function showSlide() {
    document.getElementById("photo").src = slides[index].img;
    typeText(slides[index].text);
}

function nextSlide() {
    index = (index + 1) % slides.length;
    showSlide();
}

/* Typing */
function typeText(text) {
    let i = 0;
    let msg = document.getElementById("msg");
    msg.innerHTML = "";

    let interval = setInterval(() => {
        msg.innerHTML += text.charAt(i);
        i++;
        if (i >= text.length) clearInterval(interval);
    }, 40);
}

/* ✨ Fancy particles */
function startParticles() {
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let particles = [];
    for (let i = 0; i < 100; i++) {
        particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 3,
            speed: Math.random() * 1 + 0.5
        });
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => {
            p.y -= p.speed;
            if (p.y < 0) p.y = canvas.height;

            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(255, 215, 0, 0.8)";
            ctx.fill();
        });
        requestAnimationFrame(draw);
    }

    draw();
}

/* 🌸 Flowers */
function createFlowers() {
    setInterval(() => {
        let flower = document.createElement("div");
        flower.innerHTML = "🌸";
        flower.className = "flower";
        flower.style.left = Math.random() * 100 + "vw";
        flower.style.fontSize = (Math.random() * 20 + 15) + "px";
        document.body.appendChild(flower);

        setTimeout(() => flower.remove(), 8000);
    }, 400);
}
</script>

</body>
</html>
