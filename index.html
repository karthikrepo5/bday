<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Surprise 🌸</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    overflow: hidden;
    transition: background 1s ease;
}

/* 🌈 Dynamic backgrounds */
.bg1 { background: linear-gradient(135deg, #ff9a9e, #fecfef); }
.bg2 { background: linear-gradient(135deg, #fbc2eb, #a6c1ee); }
.bg3 { background: linear-gradient(135deg, #ffecd2, #fcb69f); }
.bg4 { background: linear-gradient(135deg, #a1c4fd, #c2e9fb); }

/* 💎 Premium Birthday Text */
.birthday-text {
    font-family: 'Great Vibes', cursive;
    font-size: 4.5em;
    color: #ffffff;
    text-shadow:
        0 0 10px rgba(255,255,255,0.8),
        0 0 20px rgba(255,105,135,0.8),
        0 0 30px rgba(255,105,135,0.6);
    animation: fadeSlide 2s ease forwards;
    opacity: 0;
}

/* ✨ animation */
@keyframes fadeSlide {
    from {opacity: 0; transform: translateY(30px);}
    to {opacity: 1; transform: translateY(0);}
}

.container {
    display: flex;
    height: 100vh;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
    color: white;
}

button {
    padding: 12px 25px;
    border-radius: 25px;
    background: white;
    color: #ff4d6d;
    border: none;
    cursor: pointer;
    margin-top: 20px;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
}

.hidden {
    display: none;
}

.card {
    background: rgba(255,255,255,0.9);
    color: #333;
    padding: 25px;
    border-radius: 20px;
    width: 320px;
    backdrop-filter: blur(10px);
}

.photo {
    width: 100%;
    border-radius: 15px;
    animation: zoom 6s infinite alternate;
}

@keyframes zoom {
    from {transform: scale(1);}
    to {transform: scale(1.1);}
}

.message {
    margin-top: 15px;
    font-size: 16px;
    color: #ff4d6d;
}

/* 🌸 flowers */
.flower {
    position: fixed;
    bottom: -20px;
    font-size: 20px;
    animation: floatUp 8s linear infinite;
}

@keyframes floatUp {
    from {transform: translateY(0) rotate(0deg);}
    to {transform: translateY(-100vh) rotate(360deg);}
}
</style>
</head>

<body class="bg1">

<!-- Page 1 -->
<div id="page1" class="container">
    <h1 class="birthday-text">Happy Birthday 🌸</h1>
    <p>A beautiful day for a beautiful soul ✨</p>
    <button onclick="goNext()">Open Your Surprise 🎁</button>
</div>

<!-- Page 2 -->
<div id="page2" class="container hidden">
    <div class="card">
        <img id="photo" class="photo" src="">
        <div id="msg" class="message"></div>
        <button onclick="nextSlide()">Next ➡️</button>
    </div>
</div>

<script>
let slides = [
    {img: "https://picsum.photos/id/1018/300/200", text: "You bring so much joy into this world...", bg:"bg1"},
    {img: "https://picsum.photos/id/1015/300/200", text: "Every moment with you feels special...", bg:"bg2"},
    {img: "https://picsum.photos/id/1025/300/200", text: "Your presence is truly a gift...", bg:"bg3"},
    {img: "https://picsum.photos/id/1035/300/200", text: "Wishing you endless happiness 🌸", bg:"bg4"}
];

let index = 0;

function goNext() {
    document.getElementById("page1").classList.add("hidden");
    document.getElementById("page2").classList.remove("hidden");
    createFlowers();
    showSlide();
}

function showSlide() {
    document.body.className = slides[index].bg;
    document.getElementById("photo").src = slides[index].img;
    typeText(slides[index].text);
}

function nextSlide() {
    index = (index + 1) % slides.length;
    showSlide();
}

/* typing */
function typeText(text) {
    let i = 0;
    let msg = document.getElementById("msg");
    msg.innerHTML = "";

    let interval = setInterval(() => {
        msg.innerHTML += text.charAt(i);
        i++;
        if (i >= text.length) clearInterval(interval);
    }, 40);
}

/* flowers */
function createFlowers() {
    setInterval(() => {
        let flower = document.createElement("div");
        flower.innerHTML = "🌸";
        flower.className = "flower";
        flower.style.left = Math.random() * 100 + "vw";
        flower.style.fontSize = (Math.random() * 20 + 15) + "px";
        document.body.appendChild(flower);

        setTimeout(() => flower.remove(), 8000);
    }, 400);
}
</script>

</body>
</html>
